---
layout: null
---
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navin Chandra</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<link rel="stylesheet"
href="/assets/css/style.css">

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f5f7fa;
}


.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:250px;
    height:100%;
    background:linear-gradient(180deg,#4fe59d,#01150c);
    padding-top:35px;
    box-shadow:4px 0px 15px rgba(0,0,0,0.15);
    
    /* Smooth edge */
    border-top-right-radius:14px;
    border-bottom-right-radius:14px;

    /* subtle highlight edge */
    border-right:2px solid rgba(255,255,255,0.15);
}

/* Profile */

.profile{
    text-align:center;
    margin-bottom:10px;
    margin-top: 0px;
}

.profile img{
    width:100px;
    height: 120px;
    border-radius:20%;
    border:1px solid rgb(210, 222, 217);
    margin-bottom:5px;
    margin-top: 0px;
}

.profile h2{
    color:white;
    font-size:20px;
    margin-bottom:5px;
}

.profile p{
    color:#d4f3e4;
    font-size:14px;
}

/* Navigation */
/*

.sidebar a{
    display:block;
    padding:7px 20px;
    color:white;
    text-decoration:none;
    font-size:15px;
    transition:all 0.3s;
}
*/

.sidebar a{
    display:block;
    padding:7px 20px;
    margin:4px 12px;
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-size:15px;
    transition:all 0.25s;
}

.sidebar a i{
    margin-right:8px;
}



.sidebar a:hover{
    background:rgba(255,255,255,0.18);
    transform:translateX(4px);
    padding-left: 30px;
}

/* Main content */

.content{
    margin-left:250px;
    padding:60px;
}

/* Card styling */

.content-card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 3px 10px rgba(0,0,0,0.08);
}

/* Responsive */

@media (max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.content{
    margin-left:0;
    padding:20px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="profile">

<img src="/assets/images/navin.png">

<h2>Dr. Navin Chandra</h2>

<p>Physical Oceanographer</p>

</div>

<a href="/"><i class="bi bi-house"></i>Home</a>

<a href="/about"><i class="bi bi-person"></i>About</a>

<a href="/education"><i class="bi bi-mortarboard"></i>Education</a>

<!-- <a href="/research"><i class="bi bi-bar-chart"></i> Research</a>-->

<a href="/publications"><i class="bi bi-journal-text"></i>Publications</a>

<a href="/experience"><i class="bi bi-briefcase"></i>Experience</a>

<a href="/contact"><i class="bi bi-envelope"></i>Contact</a>


<div class="sidebar-bottom">

<a href="/assets/CV.pdf" target="_blank" class="cv-btn">
<i class="bi bi-download"></i> Download CV
</a>

<p class="cv-update">Last updated: {{ cv_update }}</p>

</div>

</div>

<!-- Main Content -->

<div class="content">

<div class="content-card">

{% block content %}
{% endblock %}

</div>

</div>

</body>

</html>
